<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>Linkipi</title>
      <style>
      @import url('https://fonts.cdnfonts.com/css/karma-2');
      
      body {
       margin : auto;
        background-image : url(link.jpeg);
        background-size : 100% 750px;
        background-repeat : no-repeat;
      }
      .nav {
        background-color : white;

      .text_nav {

      }
      .profile_text {
        text-align: center;
        font-size : 20px;
        font-family : 'karma', sans-serif;
      }
      .profile_text1 {
        text-align: center;
        font-size : 15px;
        font-family : 'karma', sans-serif;
      }
      .ytdiv {
        background-color : white;

        margin-left : 30px;
        margin-top : 60px;
        padding-left : 20px;
        border-radius : 90px;
      }
      .yt {
        width : 60px;
      }
      .ytp {
        float : right ;
        text-align : right;
        font-weight : bold;
        margin-right : 100px;
        color : black;
        font-family : 'karma', sans-serif;
        font-size : 16px;
      }
      .ytp:hover { 
        color : black;
      }
      .discorddiv {
        background-color : white;
        width : 300px;
        margin-left : 30px;
        margin-top : 20px;
        padding-left : 20px;
        border-radius : 90px;
      }
      .dcimg {
        width : 45px;
        padding-left : 6px;
      }
      .dcp {
        float : right ;
        text-align : right;
        font-weight : bold;
        margin-right : 70px;
        color : black;
        font-family : 'karma', sans-serif;
        font-size : 16px;
      }
      .dcp:hover { 
        color : black;
      }
       .igdiv {
        background-color : white;
        width : 300px;
        margin-left : 30px;
        margin-top : 20px;
        padding-left : 20px;
        border-radius : 90px;
      }
      .igimg {
        width : 45px;
        padding-left : 6px;
      }
      .igp {
        float : right ;
        text-align : right;
        font-weight : bold;
        margin-right : 95px;
        color : black;
        font-family : 'karma', sans-serif;
        font-size : 16px;
      }
      .igp:hover { 
        color : black;
      }
      .footer {
        text-align : center;
        font-size : 2px;
        font-weight : bold;
        margin-top : 235px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class = nav>
        <p class = text_nav>...</p>
        </div>

        <div class = profile_div>

          <p class = profile_text1>Halo Ini Link Tree Buatan Gua </p>
          </div>
          <a href = #><div class = ytdiv>
            <img src = YT.png class = yt />

            </div></a>
            
            <a href = #><div class = discorddiv>
            <img src = dc.png class = dcimg />
            <p class = dcp>SERVER-DISCORD</p>

            <a href = #><div class = igdiv>
